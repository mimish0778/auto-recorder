<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arsena's 10s Auto Recorder (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .recording-dot {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        /* プレビュー映像。録画canvasと同じ9:16枠にcoverで表示する（下の #preview 定義参照）。
           前面カメラ時のミラーは表示のみで、録画データには反映されない（#preview.mirror）。 */
        #preview {
            position: fixed;
            /* 録画canvasと同じアスペクト比(CAPTURE_WIDTH:CAPTURE_HEIGHT = 360:640 = 9:16)の枠に
               プレビューを収める。画面いっぱい(=端末のアスペクト比)に広げてしまうと、
               canvasのアスペクト比と食い違い、cover方式でも「見えている範囲」と
               「録画される範囲」が厳密には一致しなくなるため。
               縦画面・横画面のどちらでも9:16を保ったまま画面内に収まる最大サイズにするため、
               vw/vh単位とmin()を使って幅・高さを算出する。
               ・幅は「画面幅」と「画面高さ×(9/16)」の小さい方
               ・高さはその幅×(16/9) */
            width: min(100vw, calc(100vh * 9 / 16));
            height: calc(min(100vw, calc(100vh * 9 / 16)) * 16 / 9);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
            background: #000;
        }
        /* 前面カメラ時のミラーは transform に追記する必要があるため、専用クラスで上書き */
        #preview.mirror {
            transform: translate(-50%, -50%) scaleX(-1);
        }
        /* コントロールパネルを半透明にして重ねる */
        #ui-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            padding: 40px 0 32px 0;
            transition: transform 0.3s ease;
        }
        .ui-hidden {
            transform: translateY(100%);
        }
        /* 操作パネルの内容幅を、プレビュー枠(9:16)と同じ幅に揃える。
           これによりボタン群がプレビューの左右端と一致し、見た目が整う。
           プレビューが画面より狭い場合でも、はみ出さず中央に収まる。 */
        #ui-inner {
            width: min(100vw, calc(100vh * 9 / 16));
            max-width: 100%;
            padding-left: 16px;
            padding-right: 16px;
            box-sizing: border-box;
        }
        .angle-btn.active {
            background-color: #dc2626;
            border-color: #dc2626;
            color: #fff;
        }
        .angle-btn:disabled {
            opacity: 0.4;
        }
    </style>
</head>
<body class="font-sans text-white">

    <!-- 映像プレビュー (アスペクト比維持) -->
    <video id="preview" autoplay playsinline muted class="mirror"></video>

    <!-- 撮影サイズを固定するための隠しキャンバス（画面には表示しない） -->
    <canvas id="captureCanvas" style="position:fixed; top:-99999px; left:-99999px;"></canvas>

    <!-- REC インジケーター -->
    <div id="recordingIndicator" class="fixed top-6 left-6 flex items-center gap-2 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full z-20 hidden border border-white/10">
        <div class="w-3 h-3 bg-red-600 rounded-full recording-dot"></div>
        <span class="text-xs font-bold tracking-widest uppercase">Recording</span>
        <span id="timer" class="text-sm font-mono ml-2">00:00</span>
    </div>

    <!-- 解像度不足（アップスケール発生中）の警告バッジ -->
    <div id="resWarning" class="fixed top-20 left-6 flex items-center gap-2 bg-amber-500/90 backdrop-blur-md px-4 py-2 rounded-full z-20 hidden">
        <span class="text-xs font-bold text-black">⚠ Source resolution below target — upscaled</span>
    </div>

    <!-- カメラ種別（前面/背面）表示。左右定義の一貫性のため常に見えるようにする -->
    <div id="camLabel" class="fixed top-6 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full z-20 border border-white/10">
        <span id="camLabelText" class="text-xs font-bold tracking-wide">FRONT camera</span>
    </div>

    <!-- カメラ切り替え -->
    <button id="switchCamera" class="fixed top-6 right-6 p-4 bg-black/40 backdrop-blur-md rounded-full border border-white/10 text-white z-20 active:scale-90 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
    </button>

    <!-- 操作パネル -->
    <div id="ui-overlay">
        <div id="ui-inner" class="mx-auto space-y-4">
            <div class="flex gap-3 items-end">
                <!-- Position: 5ボタンを横いっぱいに均等配置 -->
                <div class="flex-1 min-w-0 space-y-1.5">
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest ml-1">Position</label>
                    <div id="angleSelector" class="grid grid-cols-5 gap-1">
                        <button type="button" data-angle="pos0" class="angle-btn py-2.5 px-0 rounded-lg text-[11px] font-bold bg-white/10 border border-white/20 transition-all active:scale-95">pos0</button>
                        <button type="button" data-angle="pos1" class="angle-btn py-2.5 px-0 rounded-lg text-[11px] font-bold bg-white/10 border border-white/20 transition-all active:scale-95">pos1</button>
                        <button type="button" data-angle="pos2" class="angle-btn py-2.5 px-0 rounded-lg text-[11px] font-bold bg-white/10 border border-white/20 transition-all active:scale-95">pos2</button>
                        <button type="button" data-angle="pos3" class="angle-btn py-2.5 px-0 rounded-lg text-[11px] font-bold bg-white/10 border border-white/20 transition-all active:scale-95">pos3</button>
                        <button type="button" data-angle="pos4" class="angle-btn py-2.5 px-0 rounded-lg text-[11px] font-bold bg-white/10 border border-white/20 transition-all active:scale-95">pos4</button>
                    </div>
                </div>
                <!-- Start #: 番号入力（手動設定） -->
                <div class="w-16 shrink-0 space-y-1.5">
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest ml-1">Start #</label>
                    <input type="number" id="startIndexInput" value="1" min="1" class="w-full bg-white/10 border border-white/20 rounded-lg px-2 py-2.5 text-sm text-center outline-none">
                </div>
            </div>

            <div class="flex gap-3">
                <button id="startBtn" class="flex-1 py-4 bg-red-600 hover:bg-red-500 text-white font-bold rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                    <div class="w-3 h-3 bg-white rounded-full"></div>
                    <span>START AUTO REC</span>
                </button>

                <button id="stopBtn" class="hidden flex-1 py-4 bg-white text-black font-bold rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                    <div class="w-3 h-3 bg-black rounded-sm"></div>
                    <span>STOP</span>
                </button>
            </div>

            <div id="log" class="text-[10px] text-zinc-400 font-mono text-center opacity-60">
                Ready to record. Background recording enabled.
            </div>
        </div>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const captureCanvas = document.getElementById('captureCanvas');
        const canvasCtx = captureCanvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const angleButtons = document.querySelectorAll('.angle-btn');
        const startIndexInput = document.getElementById('startIndexInput');
        const log = document.getElementById('log');
        const timerDisplay = document.getElementById('timer');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const resWarning = document.getElementById('resWarning');
        const camLabelText = document.getElementById('camLabelText');
        const switchCameraBtn = document.getElementById('switchCamera');
        const uiOverlay = document.getElementById('ui-overlay');

        let selectedAngle = 'pos2'; // デフォルトは中央付近

        function setSelectedAngle(angle) {
            selectedAngle = angle;
            angleButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.angle === angle);
            });
        }

        angleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRecording) return; // 録画中はアングル変更不可（ファイル名がブレるのを防止）
                setSelectedAngle(btn.dataset.angle);
            });
        });

        // ▼ ここで「常にこのピクセルサイズで録画する」というサイズを固定します。
        //    端末やカメラの実解像度が違っても、出力される動画は必ずこのサイズになります。
        //
        //    [機械学習(features.py = MediaPipe FaceMesh)に最適な解像度の逆算]
        //    FaceMeshは「BlazeFaceで顔検出 → 顔領域をクロップ → クロップに対してランドマーク回帰」
        //    というパイプラインで動く。つまりランドマーク精度を決めるのはフレーム全体の解像度ではなく
        //    「フレーム内で顔が占めるピクセル数」であり、顔クロップが概ね256px四方を超えると
        //    精度は飽和し、それ以上フレーム解像度を上げても特徴量は改善しない。
        //
        //    本撮影条件: 顔が画面の約半分(肩から上)・縦長固定。
        //    → 顔の高さ ≒ フレーム高さの1/2。顔クロップに256px確保するにはフレーム高さ約512px。
        //      精度を確実に飽和域に入れるため余裕を見て高さ640pxとすると、顔クロップは約320pxとなり
        //      FaceMeshの精度上限に十分達する。縦長9:16で幅は 640*9/16 = 360px。
        //    → 360x640 が「精度は飽和させつつ、データ量・処理を無駄に増やさない」最適点。
        //      (これ以上高解像度にしても精度は変わらずファイルサイズと処理時間だけ増える)
        //    近年のスマホ・PCカメラはこの解像度をネイティブで超えるため、アップスケールもほぼ起きない。
        const CAPTURE_WIDTH = 360;
        const CAPTURE_HEIGHT = 640;
        const CAPTURE_FPS = 30;

        // 各セグメントの録画秒数は10秒固定（研究プロトコルとして固定）。
        const SEGMENT_SECONDS = 10;

        // 撮影中に「実際はこのソース解像度未満で、アップスケールが発生している」ことを検知するための閾値。
        // これを下回るソース解像度で録画が行われた場合、画面上に警告を出す。
        let sourceIsBelowTarget = false;

        captureCanvas.width = CAPTURE_WIDTH;
        captureCanvas.height = CAPTURE_HEIGHT;
        setSelectedAngle(selectedAngle);

        let mediaRecorder;
        let recordedChunks = [];
        let segmentIndex = 1;
        let isRecording = false;
        let currentStream;
        let canvasStream; // 固定サイズキャンバスから生成する録画用ストリーム
        let useFrontCamera = true;
        let recordingStartTime;
        let drawLoopRunning = false;
        let segmentTimeoutId = null; // 各セグメントの自動停止タイマーID（宙に浮くのを防ぐため保持）

        // バックグラウンドでの動作を維持するための Wake Lock
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            // 取得したいカメラ映像の解像度は「目標の縦長サイズ」を希望する。
            // ※以前のバージョンではここを横長 (Math.max/min) で要求していたため、
            //   スマホでも横長の映像が返ってきてプレビューが横長になるバグがありました。
            //   ideal はあくまで希望値なので、古いスマホで対応していなくても取得自体は成功し、
            //   その場合は取得できた最大解像度が使われます（下のcanvas描画で自動的に
            //   CAPTURE_WIDTH x CAPTURE_HEIGHT にリサイズされるため、出力サイズは常に統一されます）。
            const idealWidth = CAPTURE_WIDTH;
            const idealHeight = CAPTURE_HEIGHT;

            // 試す制約の候補（上から順に試し、失敗したら次を試す）
            // 1. facingMode指定あり（スマホの前面/背面切り替え用）
            // 2. facingMode指定なし（PCのWebカメラはfacingMode指定で失敗することがあるため）
            const constraintCandidates = [
                {
                    video: {
                        facingMode: useFrontCamera ? "user" : "environment",
                        width: { ideal: idealWidth },
                        height: { ideal: idealHeight }
                    },
                    audio: true
                },
                {
                    video: {
                        width: { ideal: idealWidth },
                        height: { ideal: idealHeight }
                    },
                    audio: true
                },
                {
                    // 解像度指定なし（上記が両方失敗する非常に古い/特殊な端末向けの最終フォールバック）
                    video: true,
                    audio: true
                }
            ];

            let lastError = null;
            for (const constraints of constraintCandidates) {
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                    lastError = null;
                    break;
                } catch (err) {
                    lastError = err;
                }
            }

            if (!currentStream) {
                log.textContent = "Error: " + (lastError ? lastError.message : "camera unavailable");
                return;
            }

            preview.srcObject = currentStream;

            if (useFrontCamera) {
                preview.classList.add('mirror');
                camLabelText.textContent = "FRONT camera";
            } else {
                preview.classList.remove('mirror');
                camLabelText.textContent = "BACK camera";
            }

            // 実際のカメラ映像は固定サイズのキャンバスに描画し、
            // 録画はそのキャンバスの映像ストリームから行う（＝端末に依らず出力サイズが一定）
            startDrawLoop();

            const track = currentStream.getVideoTracks()[0];
            const settings = track ? track.getSettings() : {};
            const srcW = settings.width || 0;
            const srcH = settings.height || 0;

            // このソース解像度をキャンバスのカバー方式クロップに当てはめた場合の拡大率を計算し、
            // 1を超えていれば「実質的にアップスケールが発生している」と判定する。
            let scaleFactor = 1;
            if (srcW && srcH) {
                const canvasRatio = CAPTURE_WIDTH / CAPTURE_HEIGHT;
                const videoRatio = srcW / srcH;
                scaleFactor = (videoRatio > canvasRatio)
                    ? CAPTURE_HEIGHT / srcH
                    : CAPTURE_WIDTH / srcW;
            }
            sourceIsBelowTarget = scaleFactor > 1.01;
            resWarning.classList.toggle('hidden', !sourceIsBelowTarget);

            log.textContent = sourceIsBelowTarget
                ? `⚠ Camera source ${srcW}x${srcH} is below target ${CAPTURE_WIDTH}x${CAPTURE_HEIGHT} (upscaled ${scaleFactor.toFixed(2)}x)`
                : `Camera ready (source ${srcW}x${srcH}). Output: ${CAPTURE_WIDTH}x${CAPTURE_HEIGHT} (downscaled, no upscaling)`;
        }

        // カメラ映像を、指定サイズのキャンバスに「中央クロップでフルカバー」して毎フレーム描画する。
        //
        // 【研究データの左右一貫性のための最重要処理】
        // features.py は左右の非対称性で噛む位置を判定するため、録画データの左右の向きは
        // 全サンプルで厳密に一致していなければならない。
        // プレビュー(video要素)には見やすさのため前面カメラ時にミラー(.mirror)をかけるが、
        // それは【表示だけ】であり、ここでキャンバスに描画する映像には決してミラーを適用しない。
        // → 前面/背面のどちらで撮っても、録画される映像は常に「カメラが捉えた実際の向き」で統一される。
        function drawFrameToCanvas() {
            const vw = preview.videoWidth;
            const vh = preview.videoHeight;

            if (vw && vh) {
                const canvasRatio = CAPTURE_WIDTH / CAPTURE_HEIGHT;
                const videoRatio = vw / vh;

                let sx, sy, sw, sh;
                if (videoRatio > canvasRatio) {
                    // 映像の方が横長 → 左右をクロップ
                    sh = vh;
                    sw = vh * canvasRatio;
                    sx = (vw - sw) / 2;
                    sy = 0;
                } else {
                    // 映像の方が縦長 → 上下をクロップ
                    sw = vw;
                    sh = vw / canvasRatio;
                    sx = 0;
                    sy = (vh - sh) / 2;
                }

                // ミラーは一切かけずに描画（＝録画データは常に実際の向き）
                canvasCtx.drawImage(preview, sx, sy, sw, sh, 0, 0, CAPTURE_WIDTH, CAPTURE_HEIGHT);
            }

            if (drawLoopRunning) {
                requestAnimationFrame(drawFrameToCanvas);
            }
        }

        function startDrawLoop() {
            if (!canvasStream) {
                // captureStream は一度だけ作成し、使い回す
                canvasStream = captureCanvas.captureStream(CAPTURE_FPS);
            }
            if (!drawLoopRunning) {
                drawLoopRunning = true;
                requestAnimationFrame(drawFrameToCanvas);
            }
        }

        switchCameraBtn.addEventListener('click', () => {
            // 録画中のカメラ切替は、currentStreamの差し替えで録画が壊れる／
            // 前面・背面が混在して左右定義がブレるため禁止する。
            if (isRecording) {
                log.textContent = "⚠ Cannot switch camera while recording. Press STOP first.";
                return;
            }
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        startBtn.addEventListener('click', async () => {
            if (!currentStream) return;
            if (isRecording) return; // 二重START防止

            // 開始番号の検証（1以上の整数）。ここで指定した番号から連番でファイルが保存される。
            const startIndex = parseInt(startIndexInput.value, 10);
            if (!Number.isFinite(startIndex) || startIndex < 1) {
                log.textContent = "⚠ Start # must be an integer of 1 or more.";
                return;
            }

            // --- 前回録画の残存状態を明示的に後始末（STOP後に再開できなくなる不具合の防止） ---
            if (segmentTimeoutId !== null) {
                clearTimeout(segmentTimeoutId);
                segmentTimeoutId = null;
            }
            if (mediaRecorder) {
                // 前回のmediaRecorderのイベントを解除し、中途半端に残った状態を断ち切る
                mediaRecorder.ondataavailable = null;
                mediaRecorder.onstop = null;
                if (mediaRecorder.state !== 'inactive') {
                    try { mediaRecorder.stop(); } catch (e) {}
                }
                mediaRecorder = null;
            }
            recordedChunks = [];

            await requestWakeLock();
            isRecording = true;
            segmentIndex = startIndex;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            recordingIndicator.classList.remove('hidden');
            angleButtons.forEach(btn => btn.disabled = true);
            startIndexInput.disabled = true;

            uiOverlay.style.opacity = "0.4";

            startRecordingSegment();
            startTimerLoop(); // タイマーの更新を開始（二重起動防止つき）
        });

        stopBtn.addEventListener('click', () => {
            isRecording = false;
            // 進行中セグメントの自動停止タイマーをクリア（残ると再START時に新録画を誤って止める）
            if (segmentTimeoutId !== null) {
                clearTimeout(segmentTimeoutId);
                segmentTimeoutId = null;
            }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            recordingIndicator.classList.add('hidden');
            angleButtons.forEach(btn => btn.disabled = false);
            startIndexInput.disabled = false;
            uiOverlay.style.opacity = "1";
            log.textContent = "Stopped.";
            timerDisplay.textContent = "00:00";
        });

        function startRecordingSegment() {
            if (!isRecording) return;

            recordedChunks = [];
            const mimeTypes = [
                'video/mp4;codecs=avc1',
                'video/webm;codecs=vp9',
                'video/webm'
            ];
            const mimeType = mimeTypes.find(type => MediaRecorder.isTypeSupported(type)) || '';
            const options = { mimeType, videoBitsPerSecond: 8000000 };

            // 映像は「固定サイズキャンバス」のトラック、音声はマイクのトラックを合成して録画する
            const combinedStream = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...currentStream.getAudioTracks()
            ]);

            mediaRecorder = new MediaRecorder(combinedStream, options);

            const intervalMs = SEGMENT_SECONDS * 1000;
            let segmentStartMs = 0;
            // このセグメントが「設定時間を満了して自動停止したか」を示すフラグ。
            // 満了停止(setTimeoutが発火してstop)した場合のみ true になる。
            // STOPボタンによる途中停止では false のままなので、そのセグメントは破棄される。
            // ※ 時間の実測(Date.now差分)で判定すると、setTimeout→stop→onstopの実行遅延により
            //   正常な満了セグメントの実測長が intervalMs をわずかに前後し、誤判定が起きる。
            //   そのため「停止理由」で厳密に判定する。
            let reachedFullDuration = false;

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const actualDurationMs = Date.now() - segmentStartMs;
                if (reachedFullDuration) {
                    // 設定時間を満了したセグメントのみ保存
                    saveBlob();
                } else {
                    // 設定時間に満たずに停止したセグメント（STOPでの中断）は破棄
                    recordedChunks = [];
                    log.textContent = `Discarded incomplete segment (${(actualDurationMs/1000).toFixed(1)}s < ${(intervalMs/1000).toFixed(1)}s).`;
                }
                if (isRecording) {
                    startRecordingSegment();
                }
            };

            mediaRecorder.start();
            segmentStartMs = Date.now();
            recordingStartTime = segmentStartMs; // 各セグメント開始時に時刻を記録

            log.textContent = sourceIsBelowTarget
                ? `⚠ Recording #${segmentIndex} [${selectedAngle}]... UPSCALED (source below ${CAPTURE_WIDTH}x${CAPTURE_HEIGHT})`
                : `Recording #${segmentIndex} [${selectedAngle}]... (${CAPTURE_WIDTH}x${CAPTURE_HEIGHT})`;

            segmentTimeoutId = setTimeout(() => {
                if (isRecording && mediaRecorder.state === 'recording') {
                    reachedFullDuration = true; // 満了による停止であることを記録
                    mediaRecorder.stop();
                }
            }, intervalMs);
        }

        // タイマー更新関数
        let timerLoopRunning = false;
        function updateTimer() {
            if (!isRecording) { timerLoopRunning = false; return; }

            if (recordingStartTime) {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const seconds = String(elapsed % 60).padStart(2, '0');
                const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
                timerDisplay.textContent = `${minutes}:${seconds}`;
            }

            requestAnimationFrame(updateTimer);
        }
        function startTimerLoop() {
            if (!timerLoopRunning) {
                timerLoopRunning = true;
                requestAnimationFrame(updateTimer);
            }
        }

        function saveBlob() {
            if (recordedChunks.length === 0) return;

            const blobType = mediaRecorder.mimeType;
            const blob = new Blob(recordedChunks, { type: blobType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const baseName = selectedAngle;
            const ext = blobType.includes('mp4') ? 'mp4' : 'webm';

            a.href = url;
            a.download = `${baseName}_${String(segmentIndex).padStart(3, '0')}.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            segmentIndex++;
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        startCamera();

        preview.addEventListener('click', () => {
            uiOverlay.style.opacity = uiOverlay.style.opacity === "1" ? "0.4" : "1";
        });
    </script>
</body>
</html>
